[project]
name = "little-x"
version = "1.0.0"
description = "Little X - A Twitter-like social app built with Jac"
entry-point = "main.jac"

[jacpack]
name = "little-x"
description = "Little X social app template"

[jac-shadcn]
style = "nova"
baseColor = "zinc"
theme = "orange"
font = "figtree"
radius = "large"
menuAccent = "subtle"
menuColor = "default"
[client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[dependencies]
numpy = ">=1.24.0"
scikit-learn = ">=1.3.0"

[dependencies.npm]
"@fontsource-variable/figtree" = "*"
"@tailwindcss/vite" = "^4.1.17"
tailwindcss = "^4.1.17"
shadcn = "^3.8.5"
clsx = "^2.1.1"
tailwind-merge = "^3.5.0"
tw-animate-css = "^1.4.0"
radix-ui = "*"
class-variance-authority = "*"
"@hugeicons/react" = "*"
"@hugeicons/core-free-icons" = "*"
lucide-react = "^0.469.0"
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
zod = "^4.3.6"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[client.app_meta_data]
title = "Little-X"
description = "A decentralized social platform built with Jac"
keywords = "little-x social jac jaseci"
author = "Jaseci Labs"
theme_color = "#f97316"
icon = "/static/assets/littlex-logo.svg"

# ---------------------------------------------------------------------------
# Scaling to Kubernetes (Episode 10)
#
# None of the application code above changes to scale. Everything below is
# deployment configuration read by `jac start main.jac --scale`. The `scale`
# subsystem ships inside jac; `jac install` pulls the optional deps (pymongo,
# redis, kubernetes, docker, ...) declared here into .jac/venv.
# Precedence everywhere: env var > jac.toml > default.
# ---------------------------------------------------------------------------

[scale.server]
docs_enabled = false             # no /docs, /redoc, /openapi.json in prod
suppress_health_check_logs = true

[scale.database]
# Multi-replica requires a shared store. SQLite (the dev default) can't be
# shared across pods. Mongo holds the graph + users; Redis is the cache tier.
mongodb_uri = "${MONGODB_URI}"
redis_url = "${REDIS_URL}"

[scale.secrets]
# Read from the local environment at deploy time, injected as a k8s Secret.
JWT_SECRET = "${JWT_SECRET}"           # auth episode — change the default
OPENAI_API_KEY = "${OPENAI_API_KEY}"   # AI episode — model key

[scale.kubernetes]
app_name = "little-x"
namespace = "production"
min_replicas = 2                 # HPA bounds — autoscaling needs cpu_request
max_replicas = 10
cpu_utilization_target = 70
cpu_request = "250m"
memory_limit = "2Gi"
health_check_path = "/health"    # built-in /health (liveness) + /ready
domain = "littlex.example.com"
cert_manager_email = "you@example.com"
ingress_limit_rps = 20           # per-IP rate limit at the ingress

[scale.monitoring]
enabled = true                   # Prometheus /metrics + Grafana dashboard
walker_metrics = true

[dev]
